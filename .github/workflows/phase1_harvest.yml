name: Phase 1 - Layout & EH Harvest

on:
  workflow_dispatch:

jobs:
  harvest-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build harvester
        shell: cmd
        run: |
          mkdir artifacts
          cl /nologo /EHsc /MD /Zi ^
            /I"%VCToolsInstallDir%ATLMFC\include" /I"%VCToolsInstallDir%include" ^
            phase1\harvest\harvest.cpp ^
            /Fe:artifacts\harvest.exe ^
            /link /LIBPATH:"%VCToolsInstallDir%ATLMFC\lib\x64" mfc140u.lib

      - name: Dump MSVC class layouts
        shell: cmd
        run: |
          cl /nologo /c /EHsc /MD ^
            /I"%VCToolsInstallDir%ATLMFC\include" /I"%VCToolsInstallDir%include" ^
            /d1reportSingleClassLayoutCObject ^
            /d1reportSingleClassLayoutCCmdTarget ^
            /d1reportSingleClassLayoutCWnd ^
            /d1reportSingleClassLayoutCWinThread ^
            /d1reportSingleClassLayoutCWinApp ^
            /d1reportSingleClassLayoutCDocument ^
            /d1reportSingleClassLayoutCView ^
            /d1reportSingleClassLayoutCCtrlView ^
            /d1reportSingleClassLayoutCScrollView ^
            /d1reportSingleClassLayoutCFrameWnd ^
            /d1reportSingleClassLayoutCMDIFrameWnd ^
            /d1reportSingleClassLayoutCMDIChildWnd ^
            /d1reportSingleClassLayoutCDialog ^
            /d1reportSingleClassLayoutCDocTemplate ^
            /d1reportSingleClassLayoutCSingleDocTemplate ^
            /d1reportSingleClassLayoutCMultiDocTemplate ^
            /d1reportSingleClassLayoutCDocManager ^
            /d1reportSingleClassLayoutCOleDocument ^
            /d1reportSingleClassLayoutCOleLinkingDoc ^
            /d1reportSingleClassLayoutCOleServerDoc ^
            /d1reportSingleClassLayoutCOleClientItem ^
            /d1reportSingleClassLayoutCOleServerItem ^
            /d1reportSingleClassLayoutCOleObjectFactory ^
            /d1reportSingleClassLayoutCOleDataSource ^
            /d1reportSingleClassLayoutCControlBar ^
            /d1reportSingleClassLayoutCStatusBar ^
            /d1reportSingleClassLayoutCToolBar ^
            /d1reportSingleClassLayoutCSplitterWnd ^
            /d1reportSingleClassLayoutCDockState ^
            /d1reportSingleClassLayoutCRecentFileList ^
            /d1reportSingleClassLayoutCCommandLineInfo ^
            phase1\harvest\layout_probe.cpp /Foartifacts\layout_probe.obj > artifacts\class_layouts.txt 2>&1
          rem cl returns 0; show a short head so the log confirms output
          powershell -Command "Get-Content artifacts\class_layouts.txt -TotalCount 40"

      - name: Run harvester
        shell: pwsh
        run: |
          Set-Location artifacts
          .\harvest.exe

      - name: Build tracer (Windows)
        shell: pwsh
        run: |
          cl /nologo /LD tools\tracer\windows\tracer_detours.cpp /Fe:artifacts\tracer_detours.dll

      - name: Test tracer
        shell: pwsh
        run: |
          $env:TRACE_OUT = "artifacts\golden_trace.json"
          $dll = "$(Resolve-Path artifacts\tracer_detours.dll)"
          rundll32 $dll,tracer_init
          [void][System.Reflection.Assembly]::LoadWithPartialName('System.Windows.Forms')
          [System.Runtime.InteropServices.Marshal]::GetHINSTANCE([System.Reflection.Assembly]::GetExecutingAssembly().ManifestModule) | Out-Null
          Get-Content artifacts\golden_trace.json -ErrorAction SilentlyContinue

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase1_harvest
          path: artifacts/
          retention-days: 14

  build-wine-tracer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install mingw
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Build wine tracer
        run: |
          mkdir -p artifacts
          x86_64-w64-mingw32-gcc -shared -O2 tools/tracer/wine/tracer_wine.c -o artifacts/tracer_wine.dll
      - name: Upload wine tracer
        uses: actions/upload-artifact@v7
        with:
          name: phase1_wine_tracer
          path: artifacts/tracer_wine.dll
          retention-days: 14

  import-libs:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Generate DEF and import libs for CRT
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $ucrt = "$env:SystemRoot\System32\ucrtbase.dll"
          $vcrt = "$env:SystemRoot\System32\vcruntime140.dll"
          foreach ($pair in @(@{Name='ucrtbase'; Path=$ucrt}, @{Name='vcruntime140'; Path=$vcrt})) {
            $def = "artifacts/$($pair.Name).def"
            $exp = & dumpbin /nologo /exports $pair.Path
            $names = @("LIBRARY $($pair.Name)", "EXPORTS")
            foreach ($line in $exp) {
              if ($line -match '^\s*\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)$') { $names += $Matches[1] }
            }
            $names | Set-Content -Path $def -Encoding ASCII
            lib /def:$def /machine:x64 /out:"artifacts/$($pair.Name).lib"
          }
      - name: Upload CRT import libs
        uses: actions/upload-artifact@v7
        with:
          name: phase1_crt_imports
          path: artifacts/
          retention-days: 14
